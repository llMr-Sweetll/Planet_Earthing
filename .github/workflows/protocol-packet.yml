name: Protocol Packet

on:
  workflow_dispatch:
  push:
    tags:
      - "protocol-v*"
      - "pilot-freeze-v*"
      - "analysis-freeze-v*"

permissions:
  contents: write

jobs:
  packet:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Build protocol packet
        run: |
          mkdir -p dist
          tar \
            --exclude='.git' \
            --exclude='data/raw/*' \
            --exclude='data/processed/*' \
            --exclude='outputs/*' \
            -czf dist/planet-earthing-protocol-packet.tar.gz \
            README.md \
            LICENSE \
            CITATION.cff \
            HOW_TO_WORK.md \
            CONTRIBUTING.md \
            docs \
            experiments \
            src \
            tests \
            scripts \
            pyproject.toml

      - name: Upload packet artifact
        uses: actions/upload-artifact@v7
        with:
          name: planet-earthing-protocol-packet
          path: dist/planet-earthing-protocol-packet.tar.gz

      - name: Publish GitHub release on freeze tags
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          files: dist/planet-earthing-protocol-packet.tar.gz
          generate_release_notes: true

