name: Validate

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run tests
        run: PYTHONPATH=src python3 -m unittest discover -s tests

      - name: Validate JSON templates
        run: |
          python3 -m json.tool experiments/pet-the-plant/session_template.json >/dev/null
          python3 -m json.tool experiments/pet-the-plant/analysis_config.json >/dev/null

      - name: Validate metadata template
        run: PYTHONPATH=src python3 -m planetearthing.cli validate-metadata experiments/pet-the-plant/session_template.json

      - name: ASCII portability scan
        run: |
          python3 - <<'PY'
          from pathlib import Path

          failures = []
          ignored_dirs = {".git", "__pycache__"}
          ignored_suffixes = {".pyc"}
          for path in Path(".").rglob("*"):
              if any(part in ignored_dirs for part in path.parts) or not path.is_file():
                  continue
              if path.suffix in ignored_suffixes:
                  continue
              data = path.read_bytes()
              try:
                  data.decode("ascii")
              except UnicodeDecodeError:
                  failures.append(str(path))

          if failures:
              print("Non-ASCII files:")
              for failure in failures:
                  print(f"  {failure}")
              raise SystemExit(1)
          PY
