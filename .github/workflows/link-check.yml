name: Link Check

on:
  workflow_dispatch:
  schedule:
    - cron: "23 5 * * 1"
  pull_request:
    paths:
      - "**/*.md"
      - "docs/research/evidence-ledger.json"

permissions:
  contents: read

jobs:
  links:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Check Markdown and evidence links
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --no-progress
            --accept 200,206,403,405,429
            README.md
            HOW_TO_WORK.md
            CONTRIBUTING.md
            docs/**/*.md
            docs/research/evidence-ledger.json
